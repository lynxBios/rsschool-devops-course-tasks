name: GitHub Actions and AWS workflow
on: push
permissions:
  id-token: write
  contents: read

jobs:
  terraform-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
      
      - name: Format Code
        run:  terraform fmt -check

  terraform-plan:
    runs-on: ubuntu-latest
    environment: development
    defaults:
      run:
        shell: bash
    needs: terraform-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423606154:role/GithubActionsRole
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Initialize Terraform
        run: terraform init

      - name: Deployment Plan For Tfstate Bucket
        run: terraform plan -target=aws_s3_bucket.lynxr-terraform-state

      - name: Terraform Plan For GithubActionsRole
        run: terraform plan -target=aws_iam_role.GithubActionsRole -var 'GithubActionsRole=${{ secrets.GITHUBACTIONSROLE }}'

      - name: Create deployment plan for all resources
        run: terraform plan

  terraform-apply:
    runs-on: ubuntu-latest
    environment: development
    defaults:
      run:
        shell: bash
    needs: terraform-plan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423606154:role/GithubActionsRole
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Initialize Terraform
        run: terraform init

      - name: Deploy infrastructure
        run: terraform apply
